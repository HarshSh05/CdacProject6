# ===== PostgreSQL =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskflow_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:taskflow}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
app.jwt.secret=your-256-bit-secret-key-here-change-this-in-production
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000

# ===== Server =====
server.port=8080

# Fix LocalDate / LocalDateTime serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.time-zone=Asia/Kolkata